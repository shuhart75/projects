<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulation + AI Agent (MUI)</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@mui/material@5.15.20/umd/material-ui.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background: #f5f6f8; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const {
      Box, Button, Chip, CssBaseline, Dialog, DialogContent, Divider, Grid,
      List, ListItemButton, ListItemText, Paper, Stack, Tab, Tabs, TextField,
      ThemeProvider, Typography, createTheme, CircularProgress
    } = MaterialUI;
    const { useMemo, useState, useEffect, useRef } = React;

    const theme = createTheme({
      palette: {
        mode: "light",
        background: { default: "#f5f6f8" },
        primary: { main: "#214f8f" },
        success: { main: "#3a9146" },
        text: { primary: "#2f3747", secondary: "#69748b" }
      },
      typography: {
        fontFamily: '"Segoe UI", "Liberation Sans", sans-serif',
        fontSize: 12
      },
      components: {
        MuiButton: {
          styleOverrides: {
            root: { textTransform: "none", borderRadius: 4, fontWeight: 600, fontSize: 13 }
          }
        },
        MuiPaper: { styleOverrides: { root: { borderRadius: 12 } } },
        MuiTab: { styleOverrides: { root: { minHeight: 32, padding: "6px 12px", fontWeight: 600 } } },
        MuiTextField: { defaultProps: { size: "small" } }
      }
    });

    const stages = [
      ["Подготовка данных", "с: 12:05 15.04.2026", "по: 12:21 15.04.2026"],
      ["Прогон стратегии на исходных параметрах", "с: 12:21 15.04.2026", "по: 13:14 15.04.2026"],
      ["Прогон стратегии на измененных параметрах", "с: 13:14 15.04.2026", "по: 14:00 15.04.2026"],
      ["Постобработка данных стратегии", "с: 14:00 15.04.2026", "по: 14:05 15.04.2026"],
      ["Агрегация данных для кредитных карт", "с: 14:05 15.04.2026", "по: 14:08 15.04.2026"],
      ["Скачивание агрегатов кредитных карт", "с: 14:08 15.04.2026", "по: 14:10 15.04.2026"],
      ["Формирование отчета", "с: 14:10 15.04.2026", "по: 14:11 15.04.2026"]
    ];

    const sidebarItems = ["Пилоты", "Пересечения", "История изменений", "Симуляции", "Метрики"];
    const lowerItems = ["База знаний", "Поддержка"];

    function uid() {
      const p = () => Math.random().toString(16).slice(2, 6);
      return `${p()}${p()}-${p()}-${p()}-${p()}-${p()}${p()}${p()}`;
    }

    function ReadOnlyField({ label, value }) {
      return (
        <Box>
          <Typography sx={{ fontSize: 11, color: "#68748b", mb: 0.3 }}>{label}</Typography>
          <Paper
            variant="outlined"
            sx={{
              minHeight: 30,
              px: 1,
              py: 0.6,
              borderRadius: "3px",
              bgcolor: "#f9fafb",
              borderColor: "#cfd6e1",
              display: "flex",
              alignItems: "center",
              fontSize: 13,
              color: "#566178"
            }}
          >
            {value}
          </Paper>
        </Box>
      );
    }

    function StageBar() {
      return (
        <Grid container spacing={1.2} sx={{ mt: 0.2, mb: 1.8 }}>
          {stages.map((s) => (
            <Grid item xs key={s[0]}>
              <Box sx={{ position: "relative", pt: 3 }}>
                <Box
                  sx={{
                    position: "absolute",
                    top: 0,
                    left: 0,
                    width: 16,
                    height: 16,
                    borderRadius: "50%",
                    bgcolor: "#3a9146",
                    color: "#fff",
                    fontWeight: 700,
                    fontSize: 11,
                    display: "grid",
                    placeItems: "center"
                  }}
                >
                  ✓
                </Box>
                <Typography sx={{ fontSize: 11, fontWeight: 700, color: "#394258", lineHeight: 1.2 }}>{s[0]}</Typography>
                <Typography sx={{ fontSize: 11, color: "#555f74", lineHeight: 1.2 }}>{s[1]}</Typography>
                <Typography sx={{ fontSize: 11, color: "#555f74", lineHeight: 1.2 }}>{s[2]}</Typography>
              </Box>
            </Grid>
          ))}
        </Grid>
      );
    }

    function AgentDialog({ open, onClose, onSaveBtLink }) {
      const [sessionId, setSessionId] = useState("not-started");
      const [messages, setMessages] = useState([]);
      const [text, setText] = useState("");
      const [stateText, setStateText] = useState("Готово");
      const [awaiting, setAwaiting] = useState(false);
      const [hardBlocked, setHardBlocked] = useState(false);
      const [waitingMissingData, setWaitingMissingData] = useState(false);
      const [waitingConfirm, setWaitingConfirm] = useState(false);
      const [retryCounter, setRetryCounter] = useState(0);
      const [btExists, setBtExists] = useState(false);
      const [collected, setCollected] = useState({
        businessGoal: "",
        customer: "",
        businessEffect: "Увеличение целевой выборки и оптимизация риск-аппетита."
      });
      const chatRef = useRef(null);

      useEffect(() => {
        if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, [messages]);

      const composerDisabled = awaiting || hardBlocked;

      const addMsg = (role, text) => setMessages((p) => [...p, { role, text }]);

      const startSession = (isRestart = false) => {
        const newSession = uid();
        setSessionId(newSession);
        setMessages([]);
        setHardBlocked(false);
        setAwaiting(true);
        setStateText("Инициализация...");
        setRetryCounter(0);
        setWaitingMissingData(false);
        setWaitingConfirm(false);
        setCollected({
          businessGoal: "",
          customer: "",
          businessEffect: "Увеличение целевой выборки и оптимизация риск-аппетита."
        });
        addMsg("agent", isRestart
          ? "Сессия перезапущена. Отправляем новый POST /dialog/init ..."
          : "Инициализируем диалог и отправляем POST /dialog/init ...");

        setTimeout(() => {
          setAwaiting(false);
          setStateText("Готово");
          addMsg("agent", btExists
            ? "Уже найдено ранее созданное БТ. Нужно создать новый документ? (Да/Нет)"
            : "Нужно создать БТ по завершенной симуляции SIM-CC-11? (Да/Нет)");
        }, 700);
      };

      useEffect(() => {
        if (open) startSession(false);
      }, [open]);

      const send = () => {
        if (composerDisabled) return;
        const value = text.trim();
        if (!value) return;
        setText("");
        addMsg("user", value);
        setAwaiting(true);
        setStateText("Ожидаем ответ агента...");
        setTimeout(() => processTurn(value), 650);
      };

      const processTurn = (raw) => {
        const normalized = raw.trim().toLowerCase();
        if (normalized === "timeout") {
          addMsg("error", "Превышено время ожидания ответа агента. Доступен «Перезапустить сессию».")
          setAwaiting(false);
          setHardBlocked(true);
          setStateText("Таймаут");
          return;
        }
        if (normalized === "retry") {
          const nextRetry = retryCounter + 1;
          setRetryCounter(nextRetry);
          addMsg("error", `Ошибка HTTP 503. Попытка ${nextRetry} из 3.`);
          if (nextRetry >= 3) {
            addMsg("error", "Все 3 попытки неуспешны. Нажмите «Перезапустить сессию».");
            setAwaiting(false);
            setHardBlocked(true);
            setStateText("Требуется перезапуск");
            return;
          }
          setTimeout(() => {
            addMsg("agent", "Повторный вызов /dialog/continue выполнен успешно.");
            setAwaiting(false);
            setStateText("Готово");
          }, 650);
          return;
        }

        if (!collected.businessGoal || !collected.customer) {
          if (normalized === "нет") {
            addMsg("agent", "Диалог завершен без создания БТ.");
            setAwaiting(false);
            setStateText("Завершено без публикации");
            return;
          }
          if (normalized === "да") {
            setWaitingMissingData(true);
            addMsg("agent", "Уточните, пожалуйста: 1) Бизнес-цель 2) Кто заказчик? (введите через `;`)");
            setAwaiting(false);
            setStateText("Готово");
            return;
          }
          if (waitingMissingData && raw.includes(";")) {
            const parts = raw.split(";");
            const next = {
              ...collected,
              businessGoal: (parts[0] || "").trim() || "Повышение качества принятия решений",
              customer: (parts[1] || "").trim() || "ДРРБ"
            };
            setCollected(next);
            setWaitingConfirm(true);
            addMsg("agent", "Сформирован черновик БТ:\n" +
              `- Дата: ${new Date().toLocaleDateString("ru-RU")}\n` +
              "- Наименование: Изменение Риск-параметров\n" +
              `- Бизнес-цель: ${next.businessGoal}\n` +
              `- Заказчик: ${next.customer}\n` +
              `- Бизнес-эффект: ${next.businessEffect}\n` +
              "- Аналитик: Реутов Иван Николаевич\n" +
              "- Риск-параметры: flg_uni_incf_km_switch: AS IS=0, TO BE=1\n" +
              "Подтвердить создание страницы в Confluence? (Да/Нет)");
            setAwaiting(false);
            setStateText("Готово");
            return;
          }
        }

        if (waitingConfirm) {
          if (normalized === "да") {
            addMsg("agent", "Создаю страницу в Confluence по шаблону «ПРМ КК»...");
            setTimeout(() => {
              const url = "https://confluence.delta.sbrf.ru/pages/viewpage.action?pageId=19999123456";
              addMsg("agent", "Готово. btUrl получен и сохранен в поле «Ссылка на БТ».");
              setBtExists(true);
              onSaveBtLink(url);
              setAwaiting(false);
              setWaitingConfirm(false);
              setStateText("БТ создано");
            }, 900);
            return;
          }
          if (normalized === "нет") {
            addMsg("agent", "Публикация отменена. Страница не создана.");
            setAwaiting(false);
            setWaitingConfirm(false);
            setStateText("Ожидаю корректировки");
            return;
          }
        }

        addMsg("error", "Не распознал ответ. Используйте: Да/Нет, `цель; заказчик`, `retry` или `timeout`.");
        setAwaiting(false);
        setStateText("Готово");
      };

      return (
        <Dialog open={open} onClose={onClose} maxWidth="md" fullWidth
          PaperProps={{ sx: { borderRadius: 2, overflow: "hidden" } }}>
          <Box sx={{ bgcolor: "#f1f4f9", borderBottom: "1px solid #dde4ef", px: 2, py: 1.2 }}>
            <Stack direction="row" justifyContent="space-between" alignItems="center">
              <Typography sx={{ fontSize: 15, fontWeight: 700, color: "#334160" }}>
                Диалог с AI-агентом RAIN
              </Typography>
              <Stack direction="row" spacing={1} alignItems="center">
                <Typography sx={{ fontSize: 12, color: "#6e7a91" }}>sessionId: {sessionId}</Typography>
                <Chip
                  label="Перезапустить сессию"
                  size="small"
                  variant="outlined"
                  onClick={() => startSession(true)}
                  disabled={awaiting}
                  sx={{
                    height: 22,
                    borderColor: "#bfd1eb",
                    color: "#214f8f",
                    bgcolor: "#f6f9ff",
                    fontSize: 11,
                    "& .MuiChip-label": { px: 1, fontWeight: 600 }
                  }}
                />
              </Stack>
            </Stack>
          </Box>
          <DialogContent sx={{ p: 0, bgcolor: "#fafbfc" }}>
            <Box
              ref={chatRef}
              sx={{ height: 370, overflow: "auto", p: 1.5, display: "flex", flexDirection: "column", gap: 1 }}
            >
              {messages.map((m, i) => (
                <Paper key={i} variant="outlined"
                  sx={{
                    px: 1.2, py: 1,
                    borderRadius: 2,
                    maxWidth: "84%",
                    alignSelf: m.role === "user" ? "flex-end" : m.role === "error" ? "center" : "flex-start",
                    bgcolor: m.role === "user" ? "#eff8ee" : m.role === "error" ? "#fff0f0" : "#eaf2ff",
                    borderColor: m.role === "user" ? "#d7ecd6" : m.role === "error" ? "#f3c9c9" : "#d1e2ff",
                    whiteSpace: "pre-wrap",
                    color: m.role === "error" ? "#953737" : "#2f3747"
                  }}
                >
                  <Typography sx={{ fontSize: 13, lineHeight: 1.35 }}>{m.text}</Typography>
                </Paper>
              ))}
            </Box>
            <Divider />
            <Stack direction="row" spacing={1} alignItems="center" sx={{ p: 1.4, bgcolor: "#fff" }}>
              <TextField
                fullWidth
                value={text}
                disabled={composerDisabled}
                placeholder={
                  hardBlocked ? "Сессия заблокирована. Доступен только перезапуск."
                    : awaiting ? "Ожидаем ответ агента..." : "Введите сообщение..."
                }
                onChange={(e) => setText(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") send(); }}
              />
              <Stack direction="row" spacing={1} alignItems="center">
                <Stack direction="row" spacing={0.8} alignItems="center" sx={{ minWidth: 160 }}>
                  {awaiting && <CircularProgress size={14} thickness={5} />}
                  <Typography sx={{ fontSize: 12, color: "#6a7388" }}>{stateText}</Typography>
                </Stack>
                <Button variant="contained" onClick={send} disabled={composerDisabled}>Отправить</Button>
                <Button variant="outlined" color="error" onClick={onClose}>Закрыть</Button>
              </Stack>
            </Stack>
            <Typography sx={{ p: "0 14px 12px", fontSize: 11, color: "#7a859d" }}>
              MVP: строгий turn-taking (один in-flight запрос), блокировка ввода до ответа, timeout/retry сценарии.
            </Typography>
          </DialogContent>
        </Dialog>
      );
    }

    function App() {
      const [tab, setTab] = useState(0);
      const [agentOpen, setAgentOpen] = useState(false);
      const [btLink, setBtLink] = useState("");

      const sideStyle = useMemo(() => ({
        width: 142,
        bgcolor: "#111721",
        color: "#c8d2df",
        py: 1.2,
        px: 0.6,
        display: "flex",
        flexDirection: "column",
        minHeight: "100vh"
      }), []);

      return (
        <ThemeProvider theme={theme}>
          <CssBaseline />
          <Box sx={{ display: "grid", gridTemplateColumns: "142px 1fr", minHeight: "100vh" }}>
            <Box sx={sideStyle}>
              <List dense disablePadding>
                {sidebarItems.map((label) => (
                  <ListItemButton
                    key={label}
                    selected={label === "Симуляции"}
                    sx={{
                      borderRadius: "3px",
                      mb: 0.2,
                      py: 0.5,
                      color: label === "Симуляции" ? "#77e2c0" : "#c8d2df",
                      "&.Mui-selected": { bgcolor: "#1b2431" },
                      "&.Mui-selected:hover": { bgcolor: "#1b2431" }
                    }}
                  >
                    <ListItemText primary={label} primaryTypographyProps={{ fontSize: 13 }} />
                  </ListItemButton>
                ))}
              </List>
              <Box sx={{ mt: "auto" }}>
                <List dense disablePadding>
                  {lowerItems.map((label) => (
                    <ListItemButton key={label} sx={{ borderRadius: "3px", py: 0.5 }}>
                      <ListItemText primary={label} primaryTypographyProps={{ fontSize: 12, color: "#b9c4d4" }} />
                    </ListItemButton>
                  ))}
                </List>
              </Box>
            </Box>

            <Box>
              <Box sx={{
                height: 56, borderBottom: "1px solid #e1e5ec", display: "flex",
                justifyContent: "flex-end", alignItems: "center", gap: 1.5, px: 2.2, bgcolor: "#f7f8fa"
              }}>
                <Paper variant="outlined" sx={{ px: 1.2, py: 0.6, borderRadius: 0.5, borderColor: "#d6dce5", bgcolor: "#fbfcfe" }}>
                  <Typography sx={{ fontSize: 12, color: "#4f596d" }}>ДРРБ</Typography>
                </Paper>
                <Typography sx={{ fontSize: 12, color: "#4f596d" }}>Реутов Иван Николаевич</Typography>
              </Box>

              <Box sx={{ p: "14px 18px 24px" }}>
                <Tabs value={tab} onChange={(_, v) => setTab(v)} sx={{ minHeight: 30, mb: 1.6 }}>
                  <Tab label="☰ Основная информация" sx={{
                    bgcolor: tab === 0 ? "#fff" : "#f0f2f5",
                    color: tab === 0 ? "#214f8f !important" : "#6a7488",
                    border: "1px solid #d6dce5", borderRadius: "4px", minHeight: 30, mr: 1
                  }} />
                  <Tab label="☑ Итоги симуляции" sx={{
                    bgcolor: tab === 1 ? "#fff" : "#f0f2f5",
                    color: tab === 1 ? "#214f8f !important" : "#6a7488",
                    border: "1px solid #d6dce5", borderRadius: "4px", minHeight: 30
                  }} />
                </Tabs>

                {tab === 0 && (
                  <Box>
                    <Stack direction="row" alignItems="center" spacing={1.2} sx={{ mb: 1.4 }}>
                      <Typography sx={{ fontSize: 38, fontWeight: 650, lineHeight: 1 }}>SIM-CC-11</Typography>
                      <Chip label="Завершена" size="small" sx={{ bgcolor: "#def2de", color: "#2c7740", fontWeight: 600, borderRadius: "3px" }} />
                      <Box sx={{ ml: "auto" }}>
                        <Button variant="contained" onClick={() => setAgentOpen(true)}>Сформировать БТ</Button>
                      </Box>
                    </Stack>

                    <StageBar />
                    <Divider sx={{ mb: 1.8, borderColor: "#e0e5ec" }} />

                    <Paper variant="outlined" sx={{ p: 1.8, mb: 1.4, bgcolor: "#e9edf3", borderColor: "#e1e6ee" }}>
                      <Typography sx={{ fontSize: 24, fontWeight: 700, color: "#214f8f", mb: 1 }}>⌃ Основная информация</Typography>
                      <Grid container spacing={1.4}>
                        <Grid item xs={6}><ReadOnlyField label="Пространство симуляции*" value="Кредитные карты" /></Grid>
                        <Grid item xs={6}><ReadOnlyField label="Название симуляции*" value="Переход на использование Единого дохода, рассчитанного на Клиентской стратегии." /></Grid>
                        <Grid item xs={6}><ReadOnlyField label="Режим симуляции*" value="Изменение риск-параметров" /></Grid>
                        <Grid item xs={6}><ReadOnlyField label="Описание симуляции" value="Переход на использование Единого дохода, рассчитанного на Клиентской стратегии." /></Grid>
                        <Grid item xs={6}><ReadOnlyField label="Версия сборки стратегии*" value="actual" /></Grid>
                      </Grid>
                    </Paper>

                    <Paper variant="outlined" sx={{ p: "12px 14px", mb: 1.4, bgcolor: "#e9edf3", borderColor: "#e1e6ee" }}>
                      <Typography sx={{ fontSize: 28, color: "#214f8f", fontWeight: 700 }}>⌄ Фильтрация выборки</Typography>
                    </Paper>

                    <Paper variant="outlined" sx={{ p: 1.8, bgcolor: "#e9edf3", borderColor: "#e1e6ee" }}>
                      <Typography sx={{ fontSize: 28, fontWeight: 700, color: "#214f8f", mb: 1 }}>⌃ Изменение риск-параметров</Typography>
                      <Paper variant="outlined" sx={{ p: 1.2, borderRadius: "3px", borderColor: "#d6dde8", bgcolor: "#f8fafc" }}>
                        <Grid container spacing={1.2}>
                          <Grid item xs={7}><ReadOnlyField label="Риск-параметр*" value="flg_uni_incf_km_switch" /></Grid>
                          <Grid item xs={3}><ReadOnlyField label="Дата активации" value="20.04.2026" /></Grid>
                          <Grid item xs={2}><Button fullWidth variant="outlined" disabled sx={{ mt: 2.2 }}>Удалить</Button></Grid>
                          <Grid item xs={6}><ReadOnlyField label="Текущее значение(низ)" value="0" /></Grid>
                          <Grid item xs={6}><ReadOnlyField label="Новое значение(низ)" value="1" /></Grid>
                        </Grid>
                      </Paper>
                    </Paper>
                  </Box>
                )}

                {tab === 1 && (
                  <Box>
                    <Typography sx={{ fontSize: 38, fontWeight: 700, mb: 1.5 }}>Итоги симуляции SIM-CC-11</Typography>
                    <Paper variant="outlined" sx={{ p: 1.8, minHeight: 380, bgcolor: "#e9edf3", borderColor: "#e1e6ee" }}>
                      <Grid container spacing={1.4}>
                        <Grid item xs={6}>
                          <Typography sx={{ fontSize: 11, color: "#68748b", mb: 0.3 }}>Ссылка на БТ*</Typography>
                          <Paper variant="outlined" sx={{ minHeight: 30, px: 1, py: 0.6, borderRadius: "3px", bgcolor: "#f9fafb", borderColor: "#cfd6e1", fontSize: 13 }}>
                            {btLink ? <a href={btLink} target="_blank" style={{ color: "#1c5cb5" }}>{btLink}</a> : "—"}
                          </Paper>
                        </Grid>
                        <Grid item xs={6}><ReadOnlyField label="Дата и время начала релиза" value="15.04.2026 14:10" /></Grid>
                        <Grid item xs={12}><ReadOnlyField label="Описание релиза*" value="Переход на использование Единого дохода, рассчитанного на Клиентской стратегии." /></Grid>
                        <Grid item xs={12}><ReadOnlyField label="Эффекты релиза*" value="Увеличение целевой выборки и оптимизация риск-аппетита." /></Grid>
                        <Grid item xs={12}><ReadOnlyField label="Описание итогов" value="Симуляция завершена успешно." /></Grid>
                      </Grid>
                    </Paper>
                  </Box>
                )}
              </Box>
            </Box>
          </Box>

          <AgentDialog
            open={agentOpen}
            onClose={() => setAgentOpen(false)}
            onSaveBtLink={setBtLink}
          />
        </ThemeProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
